<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diego Chorão - Poesia de Boteco</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@300;600&family=Amatic+SC:wght@700&family=Caveat:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <!-- Container que trava a proporção da imagem perfeitamente -->
        <div class="image-wrapper">
            <!-- Imagem de Fundo (com ?v=2 para burlar o cache) -->
            <img src="fundo.jpg?v=2" alt="Diego Chorão no Boteco" class="bg-image">

            <!-- Luminoso -->
            <div class="luminoso-container">
                <img src="luminoso.jpg.jpg?v=2" alt="Luminoso" class="luminoso">
            </div>

            <!-- Flyers na parede esquerda -->
            <div class="flyers-container">
                <img src="flyer1.jpg.jpg" alt="Flyer 1" class="flyer-item">
                <img src="flyer2.jpg.jpg" alt="Flyer 2" class="flyer-item">
                <img src="flyer3.jpg.jpg" alt="Flyer 3" class="flyer-item">
                <img src="flyer4.jpg.jpg" alt="Flyer 4" class="flyer-item">
                <img src="flyer5.jpg.jpg" alt="Flyer 5" class="flyer-item">
            </div>

            <!-- Cronômetro (Sem correntes, encaixado na janela direita) -->
            <div class="hanging-countdown">
                <div class="countdown-container">
                    <div id="countdown">
                        <div class="time-box">
                            <div id="days" class="time-value"></div>
                            <small>Dias</small>
                        </div>
                        <div class="time-box">
                            <div id="hours" class="time-value"></div>
                            <small>Horas</small>
                        </div>
                        <div class="time-box">
                            <div id="minutes" class="time-value"></div>
                            <small>Min</small>
                        </div>
                        <div class="time-box">
                            <div id="seconds" class="time-value"></div>
                            <small>Seg</small>
                        </div>
                    </div>
                    <div class="launch-date">27 DE JUNHO</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
