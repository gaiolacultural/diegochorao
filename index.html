<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diego Chorão - Poesia de Boteco</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@300;600&family=Amatic+SC:wght@700&family=Caveat:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <!-- Bottle Container -->
        <div class="bottle-wrapper">
            <div class="bottle">
                <div class="bottle-cap"></div>
                <div class="bottle-neck"></div>
                <div class="bottle-shoulder"></div>
                <div class="bottle-body">
                    <div class="glass-reflection"></div>
                    <img src="rotulo.png.png?v=2" alt="Rótulo Diego Chorão" class="bottle-label">
                </div>
                <div class="bottle-base"></div>
            </div>
        </div>

        <!-- Cronômetro centralizado -->
        <div class="hanging-countdown center-bottom">
            <div class="countdown-container">
                <div id="countdown">
                    <div class="time-box">
                        <div id="days" class="time-value"></div>
                        <small>Dias</small>
                    </div>
                    <div class="time-box">
                        <div id="hours" class="time-value"></div>
                        <small>Horas</small>
                    </div>
                    <div class="time-box">
                        <div id="minutes" class="time-value"></div>
                        <small>Min</small>
                    </div>
                    <div class="time-box">
                        <div id="seconds" class="time-value"></div>
                        <small>Seg</small>
                    </div>
                </div>
                <div class="launch-date">27 DE JUNHO</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
